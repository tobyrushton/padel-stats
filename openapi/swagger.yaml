basePath: /
definitions:
  auth.AuthResult:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/auth.User'
    type: object
  auth.SearchPlayersResult:
    properties:
      players:
        items:
          $ref: '#/definitions/auth.User'
        type: array
    type: object
  auth.SigninInput:
    properties:
      password:
        type: string
      username:
        type: string
    type: object
  auth.SignupInput:
    properties:
      firstName:
        type: string
      lastName:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  auth.User:
    properties:
      createdAt:
        format: date-time
        type: string
      firstName:
        type: string
      id:
        format: int64
        type: integer
      isAcceptedByAdmin:
        type: boolean
      isAdmin:
        type: boolean
      lastName:
        type: string
      updatedAt:
        format: date-time
        type: string
      username:
        type: string
    type: object
  games.CreateGameInput:
    properties:
      playedAt:
        format: date-time
        type: string
      team1Player1Id:
        format: int64
        type: integer
      team1Player2Id:
        format: int64
        type: integer
      team1Score:
        type: integer
      team2Player1Id:
        format: int64
        type: integer
      team2Player2Id:
        format: int64
        type: integer
      team2Score:
        type: integer
    type: object
  games.Game:
    properties:
      createdAt:
        format: date-time
        type: string
      creatorId:
        format: int64
        type: integer
      id:
        format: int64
        type: integer
      playedAt:
        format: date-time
        type: string
      season:
        $ref: '#/definitions/games.Season'
      seasonId:
        format: int64
        type: integer
      team1Player1:
        $ref: '#/definitions/games.Player'
      team1Player1Id:
        format: int64
        type: integer
      team1Player2:
        $ref: '#/definitions/games.Player'
      team1Player2Id:
        format: int64
        type: integer
      team1Score:
        type: integer
      team2Player1:
        $ref: '#/definitions/games.Player'
      team2Player1Id:
        format: int64
        type: integer
      team2Player2:
        $ref: '#/definitions/games.Player'
      team2Player2Id:
        format: int64
        type: integer
      team2Score:
        type: integer
      updatedAt:
        format: date-time
        type: string
    type: object
  games.Player:
    properties:
      firstName:
        type: string
      id:
        format: int64
        type: integer
      lastName:
        type: string
      username:
        type: string
    type: object
  games.Season:
    properties:
      endDate:
        format: date-time
        type: string
      id:
        format: int64
        type: integer
      name:
        type: string
      startDate:
        format: date-time
        type: string
    type: object
  handlers.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  leaderboard.Entry:
    properties:
      firstName:
        type: string
      gamesPlayed:
        type: integer
      lastName:
        type: string
      losses:
        type: integer
      playerId:
        format: int64
        type: integer
      rank:
        type: integer
      scoreDifference:
        type: integer
      username:
        type: string
      wins:
        type: integer
    type: object
  seasons.CreateSeasonInput:
    properties:
      name:
        type: string
      startDate:
        format: date
        type: string
    required:
    - name
    - startDate
    type: object
  seasons.Season:
    properties:
      endDate:
        format: date
        type: string
      id:
        type: integer
      name:
        type: string
      startDate:
        format: date
        type: string
    type: object
info:
  contact: {}
  description: API for authentication and padel stats workflows.
  title: Padel Stats API
  version: "1.0"
paths:
  /admin/users/{userID}/approve:
    post:
      description: Approve a pending user account. Requires an authenticated admin
        user.
      parameters:
      - description: User ID
        in: path
        name: userID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Approve user
      tags:
      - auth
  /auth/me:
    get:
      description: Retrieve the authenticated user from the active session token.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get current user
      tags:
      - auth
  /auth/signin:
    post:
      consumes:
      - application/json
      description: Authenticate with username and password.
      parameters:
      - description: Signin payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.SigninInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.AuthResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Sign in
      tags:
      - auth
  /auth/signup:
    post:
      consumes:
      - application/json
      description: Register a new user account.
      parameters:
      - description: Signup payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.SignupInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/auth.AuthResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Sign up
      tags:
      - auth
  /games:
    post:
      consumes:
      - application/json
      description: Create a game with two teams of two players and a final score.
      parameters:
      - description: Create game payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/games.CreateGameInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/games.Game'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Create game
      tags:
      - games
  /games/{gameID}:
    delete:
      description: Delete a game by its identifier.
      parameters:
      - description: Game ID
        in: path
        name: gameID
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Delete game
      tags:
      - games
    get:
      description: Retrieve a game by its identifier.
      parameters:
      - description: Game ID
        in: path
        name: gameID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/games.Game'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get game
      tags:
      - games
  /leaderboard:
    get:
      description: Retrieve leaderboard standings derived from game score difference
        across all seasons.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/leaderboard.Entry'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get all-time leaderboard
      tags:
      - leaderboard
  /players/{playerID}/games:
    get:
      description: Retrieve all games where the player participated.
      parameters:
      - description: Player ID
        in: path
        name: playerID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/games.Game'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List player games
      tags:
      - games
  /players/search:
    get:
      description: Search players by username, first name, or last name. Returns default
        player list when query is empty.
      parameters:
      - description: Optional player search query
        in: query
        name: query
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.SearchPlayersResult'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Search players
      tags:
      - players
  /seasons:
    get:
      description: Retrieve all seasons.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/seasons.Season'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: List seasons
      tags:
      - seasons
    post:
      consumes:
      - application/json
      description: Create a new season. Requires an authenticated admin user.
      parameters:
      - description: Create season payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/seasons.CreateSeasonInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/seasons.Season'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Create season
      tags:
      - seasons
  /seasons/{seasonID}/leaderboard:
    get:
      description: Retrieve leaderboard standings derived from game score difference
        for one season.
      parameters:
      - description: Season ID
        in: path
        name: seasonID
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/leaderboard.Entry'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get season leaderboard
      tags:
      - leaderboard
  /seasons/active:
    get:
      description: Retrieve the currently active season.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/seasons.Season'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/handlers.ErrorResponse'
      summary: Get active season
      tags:
      - seasons
schemes:
- https
- http
swagger: "2.0"
