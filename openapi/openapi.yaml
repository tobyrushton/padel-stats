openapi: 3.0.0
info:
  description: API for authentication and padel stats workflows.
  title: Padel Stats API
  contact: {}
  version: "1.0"
paths:
  /auth/signin:
    post:
      description: Authenticate with username and password.
      tags:
        - auth
      summary: Sign in
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/auth.SigninInput"
        description: Signin payload
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth.AuthResult"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
  /auth/signup:
    post:
      description: Register a new user account.
      tags:
        - auth
      summary: Sign up
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/auth.SignupInput"
        description: Signup payload
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth.AuthResult"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
  /games:
    post:
      description: Create a game with two teams of two players and a final score.
      tags:
        - games
      summary: Create game
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/games.CreateGameInput"
        description: Create game payload
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/games.Game"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
  "/games/{gameID}":
    get:
      description: Retrieve a game by its identifier.
      tags:
        - games
      summary: Get game
      parameters:
        - description: Game ID
          name: gameID
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/games.Game"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
        "404":
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
    delete:
      description: Delete a game by its identifier.
      tags:
        - games
      summary: Delete game
      parameters:
        - description: Game ID
          name: gameID
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
        "404":
          description: Not Found
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            "*/*":
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
  /leaderboard:
    get:
      description: Retrieve leaderboard standings derived from game score difference
        across all seasons.
      tags:
        - leaderboard
      summary: Get all-time leaderboard
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/leaderboard.Entry"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
  /players/search:
    get:
      description: Search players by username, first name, or last name. Returns
        default player list when query is empty.
      tags:
        - players
      summary: Search players
      parameters:
        - description: Optional player search query
          name: query
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/auth.SearchPlayersResult"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
  "/players/{playerID}/games":
    get:
      description: Retrieve all games where the player participated.
      tags:
        - games
      summary: List player games
      parameters:
        - description: Player ID
          name: playerID
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/games.Game"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
  "/seasons/{seasonID}/leaderboard":
    get:
      description: Retrieve leaderboard standings derived from game score difference
        for one season.
      tags:
        - leaderboard
      summary: Get season leaderboard
      parameters:
        - description: Season ID
          name: seasonID
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/leaderboard.Entry"
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/handlers.ErrorResponse"
servers:
  - url: /
components:
  schemas:
    auth.AuthResult:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/auth.User"
    auth.SearchPlayersResult:
      type: object
      properties:
        players:
          type: array
          items:
            $ref: "#/components/schemas/auth.User"
    auth.SigninInput:
      type: object
      properties:
        password:
          type: string
        username:
          type: string
    auth.SignupInput:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        password:
          type: string
        username:
          type: string
    auth.User:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        firstName:
          type: string
        id:
          type: integer
          format: int64
        isAdmin:
          type: boolean
        lastName:
          type: string
        updatedAt:
          type: string
          format: date-time
        username:
          type: string
    games.CreateGameInput:
      type: object
      properties:
        playedAt:
          type: string
          format: date-time
        seasonId:
          type: integer
          format: int64
        team1Player1Id:
          type: integer
          format: int64
        team1Player2Id:
          type: integer
          format: int64
        team1Score:
          type: integer
        team2Player1Id:
          type: integer
          format: int64
        team2Player2Id:
          type: integer
          format: int64
        team2Score:
          type: integer
    games.Game:
      type: object
      properties:
        createdAt:
          type: string
          format: date-time
        creatorId:
          type: integer
          format: int64
        id:
          type: integer
          format: int64
        playedAt:
          type: string
          format: date-time
        seasonId:
          type: integer
          format: int64
        team1Player1:
          $ref: "#/components/schemas/games.Player"
        team1Player1Id:
          type: integer
          format: int64
        team1Player2:
          $ref: "#/components/schemas/games.Player"
        team1Player2Id:
          type: integer
          format: int64
        team1Score:
          type: integer
        team2Player1:
          $ref: "#/components/schemas/games.Player"
        team2Player1Id:
          type: integer
          format: int64
        team2Player2:
          $ref: "#/components/schemas/games.Player"
        team2Player2Id:
          type: integer
          format: int64
        team2Score:
          type: integer
        updatedAt:
          type: string
          format: date-time
    games.Player:
      type: object
      properties:
        firstName:
          type: string
        id:
          type: integer
          format: int64
        lastName:
          type: string
        username:
          type: string
    handlers.ErrorResponse:
      type: object
      properties:
        error:
          type: string
    leaderboard.Entry:
      type: object
      properties:
        firstName:
          type: string
        gamesPlayed:
          type: integer
        lastName:
          type: string
        losses:
          type: integer
        playerId:
          type: integer
          format: int64
        rank:
          type: integer
        scoreDifference:
          type: integer
        username:
          type: string
        wins:
          type: integer
